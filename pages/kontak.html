<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONTAK</title>
</head>
<body>
    <!-- Header -->
    <iframe src="../layout/header.html" width="100%" height="500" frameborder="0" scrolling="no"></iframe>

    <center><h2>HUBUNGI KAMI</h2></center>

    <table width="50%" align="center" border="0" cellpadding="10">
        <tr>
            <td>
                <fieldset>
                    <legend><b>Formulir Kontak</b></legend>
                    <form action="" method="post">
                        <table width="100%">
                            <tr>
                                <td>Nama Lengkap</td>
                                <td>: <input type="text" name="nama" size="35" placeholder="Masukkan Nama Anda"></td>
                            </tr>
                            <tr>
                                <td>Alamat Email</td>
                                <td>: <input type="email" name="email" size="35" placeholder="contoh@email.com"></td>
                            </tr>
                            <tr>
                                <td valign="top">Pesan / Saran</td>
                                <td>: <textarea name="pesan" rows="6" cols="35"></textarea></td>
                            </tr>
                            <tr>
                                <td></td>
                                <td>
                                    <br>
                                    <input type="submit" value="Kirim Pesan"> 
                                    <input type="reset" value="Reset">
                                </td>
                            </tr>
                        </table>
                    </form>
                </fieldset>
            </td>
        </tr>
    </table>
    <br>
    <hr>
    <!-- Footer -->
    <iframe src="../layout/footer.html" width="100%" height="360" frameborder="0" scrolling="no"></iframe>
</body>
</html>
